services:
  registry:
    image: registry:3
    environment:
      - REGISTRY_LOG_OTLP=false
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
  registry-ui:
    image: quiq/registry-ui
    environment:
      - REGISTRY_HOSTNAME=registry:5000
      - REGISTRY_INSECURE=true
    ports:
      - "8080:8000"
    depends_on:
      - registry

volumes:
  registry_data: